<article class="post-row">
  <div class="post-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "1/02" }}</time>
    <span class="meta-separator">・</span>
    <span class="post-reading-time" title="読了目安時間">
      <svg class="icon-coffee" viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>
      <span>{{ .ReadingTime }}min</span>
    </span>
    {{ with .GetTerms "tags" }}
      <span class="meta-separator">・</span>
      <span class="post-tags">
        {{ range . }}<a class="tag" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>{{ end }}
      </span>
    {{ end }}
  </div>
  <h2 class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
  {{ with .Params.summary }}<p class="post-excerpt">{{ . }}</p>{{ end }}
</article>
