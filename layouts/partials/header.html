<div class="topbar">
  <a class="brand" href="{{ "/" | relURL }}">
    <div class="brand-name">{{ .Site.Title }}</div>
  </a>
  <button class="menu-toggle" type="button" data-menu-toggle aria-label="メニュー" aria-expanded="false" aria-controls="site-nav">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav class="nav" id="site-nav">
    <a href="{{ "/archives/" | relURL }}"{{ if or (eq .Layout "archives") (eq .Section "posts") }} class="active"{{ end }}>Archives</a>
    {{ if and (ne .Site.Params.showCategories false) (isset .Site.Taxonomies "categories") }}
    <a href="{{ "/categories/" | relURL }}"{{ if eq .Data.Plural "categories" }} class="active"{{ end }}>Categories</a>
    {{ end }}
    <a href="{{ "/tags/" | relURL }}"{{ if eq .Data.Plural "tags" }} class="active"{{ end }}>Tags</a>
    <a href="{{ "/about/" | relURL }}"{{ if eq .Layout "about" }} class="active"{{ end }}>About</a>
    <button class="search" type="button" data-search-open aria-label="検索"><span class="icon">🔍</span></button>
    {{ if ne .Site.Params.themeToggle false }}
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="ダークモード切り替え">
      <svg class="sun-icon" viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="moon-icon" viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    {{ end }}
  </nav>
</div>
