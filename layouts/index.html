{{ define "main" }}
<div class="wrap">
  {{ partial "header.html" . }}

  {{ $paginator := .Paginate (where .Site.RegularPages "Section" "posts") }}
  {{ range $paginator.Pages }}
    {{ partial "post-row.html" . }}
  {{ end }}

  {{ partial "pager.html" . }}

  {{ partial "footer.html" . }}
</div>
{{ end }}
