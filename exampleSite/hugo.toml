baseURL = "/"
languageCode = "ja"
title = "真夜中のテーブル"
hasCJKLanguage = true
enableEmoji = false

[module]
  [[module.imports]]
    path = "github.com/yamadatt/hugo-theme-midnight-table"

[pagination]
  pagerSize = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  eyebrow = "深夜の対話放送 ・ 文字起こしアーカイブ"
  description = "深夜の対話番組「真夜中のテーブル」の文字起こしまとめ。本・音楽・暮らし・映画を語る読み物アーカイブ。"
  showCategories = false
  themeToggle = true

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = true
    style = "bw"
